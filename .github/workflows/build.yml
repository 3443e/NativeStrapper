name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtbase5-dev-tools cmake build-essential libqt5network5 libqt5widgets5

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-linux
          path: build/nativestrapper

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download static Qt
        run: |
          curl -L https://github.com/niXman/mingw-builds-binaries/releases/download/15.1.0-rt_v12-rev0/x86_64-15.1.0-release-posix-seh-ucrt-rt_v12-rev0.7z -o mingw.7z
          7z x mingw.7z -oC:\mingw64

      - name: Install Qt static
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win64_mingw81 --outputdir D:\Qt
          
      - name: Build static
        shell: cmd
        run: |
          set PATH=C:\mingw64\mingw64\bin;D:\Qt\5.15.2\mingw81_64\bin;%PATH%
          cmake -B build -G "MinGW Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH=D:\Qt\5.15.2\mingw81_64 ^
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -static"
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows
          path: build/nativestrapper.exe