name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtbase5-dev-tools cmake build-essential libqt5network5 libqt5widgets5 libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p release
          cp build/nativestrapper release/
          cp -r assets release/
          cd release
          tar -czf ../NativeStrapper-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-linux
          path: NativeStrapper-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
  
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-curl

      - name: Build
        shell: cmd
        run: |
          cmake -B build -G "MinGW Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" ^

          cmake --build build

      - name: Deploy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          New-Item -ItemType Directory -Path release\platforms
          New-Item -ItemType Directory -Path release\styles

          Copy-Item build\nativestrapper.exe release\

          Copy-Item -Recurse assets release\

          Copy-Item "$env:Qt5_Dir\bin\Qt5Core.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Gui.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Widgets.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Network.dll" release\

          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" release\
          Copy-Item "C:\mingw64\bin\libstdc++-6.dll" release\
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" release\

          Copy-Item "$env:Qt5_Dir\plugins\platforms\qwindows.dll" release\platforms\
          Copy-Item "$env:Qt5_Dir\plugins\styles\qwindowsvistastyle.dll" release\styles\

          $opensslPath = (Get-ChildItem "C:\Program Files\OpenSSL*" -Directory | Select-Object -First 1).FullName
          Get-ChildItem "$opensslPath\bin\" -Filter "libssl*.dll" | ForEach-Object { Copy-Item $_.FullName release\ }
          Get-ChildItem "$opensslPath\bin\" -Filter "libcrypto*.dll" | ForEach-Object { Copy-Item $_.FullName release\ }

      - name: Build installer
        shell: cmd
        run: |
          choco install nsis --no-progress -y
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows-setup
          path: NativeStrapper-Setup.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows-portable
          path: release