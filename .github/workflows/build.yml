name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtbase5-dev-tools cmake build-essential libqt5network5 libqt5widgets5 libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p release
          cp build/nativestrapper release/
          cp -r assets release/
          cd release
          tar -czf ../NativeStrapper-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-linux
          path: NativeStrapper-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-curl-winssl

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -S . -B build \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/mingw64;/d/a/NativeStrapper/Qt/5.15.2/mingw81_64" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      - name: Build
        shell: msys2 {0}
        run: |
          cmake --build build --parallel

      - name: Find curl
        shell: msys2 {0}
        run: |
          find /mingw64/bin -name "*curl*"

      - name: Find curl windows path
        shell: msys2 {0}
        run: |
          cygpath -w /mingw64/bin/libcurl-4.dll
          find /mingw64/bin -name "libssl*" -o -name "libcrypto*"

      - name: Find curl deps
        shell: msys2 {0}
        run: |
          ldd /mingw64/bin/libcurl-4.dll | grep -v "system\|Windows\|ntdll"

      - name: Deploy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          New-Item -ItemType Directory -Path release\platforms
          New-Item -ItemType Directory -Path release\styles

          Copy-Item build\nativestrapper.exe release\

          Copy-Item -Recurse assets release\

          Copy-Item "$env:Qt5_Dir\bin\Qt5Core.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Gui.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Widgets.dll" release\

          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" release\
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" release\
          Copy-Item "C:\mingw64\bin\libstdc++-6.dll" release\
          
          $msys = "D:\a\_temp\msys64\mingw64\bin"
          Copy-Item "$msys\libcurl-4.dll" release\
          Copy-Item "$msys\libssl-3-x64.dll" release\
          Copy-Item "$msys\libcrypto-3-x64.dll" release\
          Copy-Item "$msys\libbrotlidec.dll" release\
          Copy-Item "$msys\libbrotlicommon.dll" release\
          Copy-Item "$msys\libidn2-0.dll" release\
          Copy-Item "$msys\libpsl-5.dll" release\
          Copy-Item "$msys\libssh2-1.dll" release\
          Copy-Item "$msys\libiconv-2.dll" release\
          Copy-Item "$msys\libintl-8.dll" release\
          Copy-Item "$msys\libunistring-5.dll" release\
          Copy-Item "$msys\libzstd.dll" release\
          Copy-Item "$msys\zlib1.dll" release\

          Copy-Item "$env:Qt5_Dir\plugins\platforms\qwindows.dll" release\platforms\
          Copy-Item "$env:Qt5_Dir\plugins\styles\qwindowsvistastyle.dll" release\styles\


      - name: Build installer
        shell: cmd
        run: |
          choco install nsis --no-progress -y
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows-setup
          path: NativeStrapper-Setup.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows-portable
          path: release