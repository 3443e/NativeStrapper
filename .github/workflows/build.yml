name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt5-default qtbase5-dev cmake build-essential
      - name: Build
        run: |
          cmake -B build
          cmake --build build

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'
      - name: Install MinGW
        run: choco install mingw
      - name: Build
        run: |
          cmake -B build -G "MinGW Makefiles"
          cmake --build build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows
          path: build/nativestrapper.exe