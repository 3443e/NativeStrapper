name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtbase5-dev-tools cmake build-essential libqt5network5 libqt5widgets5

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-linux
          path: build/nativestrapper

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Install MinGW
        run: |
          choco install mingw --version=8.1.0 --allow-downgrade
      
      - name: Build
        shell: cmd
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build build

      - name: Deploy
        shell: pwsh
        run: |
          ls "$env:Qt5_Dir\bin\libwinpthread*"
          ls "C:\mingw64\bin\libwinpthread*"
          
          (Get-Item "$env:Qt5_Dir\bin\libwinpthread-1.dll").VersionInfo
          (Get-Item "C:\mingw64\bin\libwinpthread-1.dll").VersionInfo
          New-Item -ItemType Directory -Path release
          New-Item -ItemType Directory -Path release\platforms
          New-Item -ItemType Directory -Path release\styles

          Copy-Item build\nativestrapper.exe release\

          Copy-Item "$env:Qt5_Dir\bin\Qt5Core.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Gui.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Widgets.dll" release\
          Copy-Item "$env:Qt5_Dir\bin\Qt5Network.dll" release\

          Copy-Item "C:\mingw64\bin\libgcc_s_seh-1.dll" release\
          Copy-Item "C:\mingw64\bin\libstdc++-6.dll" release\
          Copy-Item "C:\mingw64\bin\libwinpthread-1.dll" release\

          Copy-Item "$env:Qt5_Dir\plugins\platforms\qwindows.dll" release\platforms\
          Copy-Item "$env:Qt5_Dir\plugins\styles\qwindowsvistastyle.dll" release\styles\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nativestrapper-windows
          path: release/